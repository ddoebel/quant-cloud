# Exposes the Argo CD UI through the cluster ingress (K3s default: Traefik).
# Apply via Git push (same Application path as other k8s/ manifests). The resource
# lives in namespace argocd; Argo CD applies it there because metadata.namespace is set.
#
# Client: add to /etc/hosts (same VPS IP as quant.local), e.g.:
#   YOUR_VPS_IP argocd.local
# Then open: http://argocd.local  (Traefik :80 -> this route)
#
# Backend MUST be HTTP to the Service port named "http" (port 80 -> pod 8080)
# with server.insecure=true. Without that, the pod still speaks TLS on 8080 and
# plain HTTP from Traefik hangs until the proxy times out (504 Gateway Timeout).
# See docs/ops-notes.md section 6.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/service.passhostheader: "true"
    # Force HTTP to upstream (do not upgrade to HTTPS toward the pod).
    traefik.ingress.kubernetes.io/service.serversscheme: http
    # K3s Traefik defaults: use the :80 entrypoint so this route is not bound to websecure only.
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: argocd.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              name: http