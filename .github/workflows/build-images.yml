name: Build and Push Images

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "Dockerfile.api"
      - "Dockerfile.worker"
      - "requirements.txt"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

# Image names must live under packages this repo is allowed to publish. The
# workflow runs in ddoebel/quant-cloud; GITHUB_TOKEN cannot push to arbitrary
# paths like ghcr.io/.../option-pricing-cluster/... (403 on blob upload). Use
# owner-scoped names linked to this repository, e.g. quant-cloud-api.

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (API)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/quant-cloud-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest
            type=raw,value=phase1

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker:
    name: Build Worker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (Worker)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/quant-cloud-worker
          tags: |
            type=sha,prefix=sha-
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest
            type=raw,value=phase1

      - name: Build and push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifest-tags:
    name: Update deployment image tags
    runs-on: ubuntu-latest
    needs: [build-api, build-worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update k8s image tags to immutable SHA
        env:
          TAG: sha-${{ github.sha }}
          OWNER: ${{ github.repository_owner }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("k8s/phase1.yaml")
          content = path.read_text()
          tag = os.environ["TAG"]
          owner = os.environ["OWNER"]

          content = content.replace(
              "image: ghcr.io/ddoebel/quant-cloud-api:phase1",
              f"image: ghcr.io/{owner}/quant-cloud-api:{tag}"
          )
          content = content.replace(
              "image: ghcr.io/ddoebel/quant-cloud-worker:phase1",
              f"image: ghcr.io/{owner}/quant-cloud-worker:{tag}"
          )

          # Also support updating from previous SHA-based tags.
          import re
          content = re.sub(
              r"image: ghcr\.io/[^/]+/quant-cloud-api:[^\s]+",
              f"image: ghcr.io/{owner}/quant-cloud-api:{tag}",
              content,
          )
          content = re.sub(
              r"image: ghcr\.io/[^/]+/quant-cloud-worker:[^\s]+",
              f"image: ghcr.io/{owner}/quant-cloud-worker:{tag}",
              content,
          )

          path.write_text(content)
          PY

      - name: Commit and push manifest update
        run: |
          if git diff --quiet -- k8s/phase1.yaml; then
            echo "No manifest tag changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/phase1.yaml
          git commit -m "ci: bump deploy image tags to sha-${{ github.sha }}"
          git push
